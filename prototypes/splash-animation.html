<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clio — Splash</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      background: radial-gradient(ellipse 120% 100% at 50% 40%, #5B21B6 0%, #1C0336 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
    }

    #splash { overflow: visible; }

    /* Outline layer — reveals via stroke-dashoffset animation */
    #outline {
      fill: none;
      stroke: white;
      stroke-width: 1.2px;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
    }

    /* Fill layer — fades in after outline is drawn */
    #filled {
      fill: white;
      opacity: 0;
    }

    /* Replay button — hidden until animation completes */
    #replay {
      opacity: 0;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #replay:hover { border-color: rgba(255,255,255,0.7); color: white; }
  </style>
</head>
<body>
  <svg id="splash" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Soft white glow around the outline strokes -->
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <text id="outline" filter="url(#glow)">Clio</text>
    <text id="filled">Clio</text>
  </svg>

  <button id="replay" onclick="play()">Spill av igjen</button>

  <script>
    const outline = document.getElementById('outline');
    const filled  = document.getElementById('filled');
    const svg     = document.getElementById('splash');
    const replay  = document.getElementById('replay');

    const FONT_FAMILY   = "-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif";
    const FONT_SIZE     = 130;
    const FONT_WEIGHT   = 200;   // Ultra-light — shows off the outline nicely
    const LETTER_SPACE  = 8;     // px — open tracking for a refined feel
    const STROKE_LEN    = 12000; // Safe upper bound: total glyph stroke perimeter

    // Timing (ms)
    const T_OUTLINE_DELAY    = 300;
    const T_OUTLINE_DURATION = 1700;
    const T_FILL_START       = T_OUTLINE_DELAY + T_OUTLINE_DURATION * 0.85; // overlap slightly
    const T_FILL_DURATION    = 900;
    const T_OUTLINE_FADE     = T_FILL_START + 80;
    const T_REPLAY_SHOW      = T_FILL_START + T_FILL_DURATION + 200;

    let timers = [];

    function applyFont(el) {
      el.style.fontFamily    = FONT_FAMILY;
      el.style.fontSize      = FONT_SIZE + 'px';
      el.style.fontWeight    = FONT_WEIGHT;
      el.style.letterSpacing = LETTER_SPACE + 'px';
    }

    applyFont(outline);
    applyFont(filled);

    document.fonts.ready.then(setup);

    function setup() {
      const pad  = 50;
      const bbox = outline.getBBox();

      svg.setAttribute('width',  bbox.width  + pad * 2);
      svg.setAttribute('height', bbox.height + pad * 2);

      const tx = pad - bbox.x;
      const ty = pad - bbox.y;

      [outline, filled].forEach(el => {
        el.setAttribute('x', tx);
        el.setAttribute('y', ty);
      });

      play();
    }

    function play() {
      // Cancel any in-flight timers from a previous run
      timers.forEach(clearTimeout);
      timers = [];

      // Reset state instantly (no transition)
      outline.style.transition = 'none';
      filled.style.transition  = 'none';
      replay.style.transition  = 'none';

      outline.style.strokeDasharray  = STROKE_LEN;
      outline.style.strokeDashoffset = STROKE_LEN;
      outline.style.opacity          = '0';
      filled.style.opacity           = '0';
      replay.style.opacity           = '0';

      // Small forced reflow so the reset sticks before we re-apply transitions
      void outline.getBoundingClientRect();

      // Phase 1 — outline fades in and draws itself
      timers.push(setTimeout(() => {
        outline.style.transition =
          `opacity 0.2s ease-out,
           stroke-dashoffset ${T_OUTLINE_DURATION}ms cubic-bezier(0.4, 0, 0.2, 1)`;
        outline.style.opacity          = '1';
        outline.style.strokeDashoffset = '0';
      }, T_OUTLINE_DELAY));

      // Phase 2 — fill materialises
      timers.push(setTimeout(() => {
        filled.style.transition = `opacity ${T_FILL_DURATION}ms ease-out`;
        filled.style.opacity    = '1';
      }, T_FILL_START));

      // Phase 2b — outline dissolves as fill takes over
      timers.push(setTimeout(() => {
        outline.style.transition =
          `stroke-dashoffset ${T_OUTLINE_DURATION}ms cubic-bezier(0.4, 0, 0.2, 1),
           opacity 600ms ease-out`;
        outline.style.opacity = '0';
      }, T_OUTLINE_FADE));

      // Replay button appears
      timers.push(setTimeout(() => {
        replay.style.transition = 'opacity 0.5s ease-out';
        replay.style.opacity    = '1';
      }, T_REPLAY_SHOW));
    }
  </script>
</body>
</html>
