name: Clio
projectName: Clio
bundleIdPrefix: no.nav

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Clio:
    type: application
    platform: macOS
    sources:
      - path: Sources/Clio
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      PRODUCT_NAME: Clio
      EXECUTABLE_NAME: Clio
      PRODUCT_BUNDLE_IDENTIFIER: no.nav.clio
      INFOPLIST_FILE: Info.plist
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      PROVISIONING_PROFILE_SPECIFIER: ""

schemes:
  Clio:
    build:
      targets:
        Clio: all
    run:
      config: Debug
    archive:
      config: Release
