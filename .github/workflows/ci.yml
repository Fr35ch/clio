# CI/CD Workflow for Audio Recording Manager
# This workflow runs on macOS with full Xcode for Swift testing

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Swift build and test
  swift-test:
    name: Swift Tests (macOS)
    runs-on: macos-15  # macOS Sequoia with Xcode 26 (required for glassEffect / macOS 26 SDK)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show environment
        run: |
          echo "macOS version:"
          sw_vers
          echo ""
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version

      - name: Build Swift package
        run: swift build -v

      - name: Run Swift tests
        run: swift test -v

      - name: Build app (build.sh)
        run: |
          chmod +x build.sh
          ./build.sh

  # SwiftLint check
  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  # Python linting (for scripts)
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: Check formatting with Black
        run: black --check --diff scripts/ tests/ || true

      - name: Check imports with isort
        run: isort --check-only --diff scripts/ tests/ || true

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503 \
            --select=E9,F63,F7,F82 \
            || true
